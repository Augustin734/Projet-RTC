services:
  db:
    image: postgres:16
    container_name: DataBase
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./DataBase/:/docker-entrypoint-initdb.d/
    ports:
      - "${DB_PORT}:5432"
    networks:
      - devnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  back:
    build: ./Site
    container_name: Site
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT}:3000"
    volumes:
      - ./Site:/app        
      - /app/node_modules 
    networks:
      - devnet
    command: ["nodemon", "--legacy-watch", "index.js"] 

  pgadmin:
    image: dpage/pgadmin4
    container_name: Graphical_Interface
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    networks:
      - devnet

volumes:
  db_data:

networks:
  devnet:
    driver: bridge
